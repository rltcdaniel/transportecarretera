<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <rect width="32" height="32" rx="6" fill="#C8401A"/>
  <!-- Truck body -->
  <rect x="3" y="12" width="16" height="10" rx="2" fill="#fff"/>
  <!-- Cab -->
  <rect x="19" y="14" width="9" height="8" rx="2" fill="#fff"/>
  <!-- Windshield -->
  <rect x="20" y="15" width="7" height="5" rx="1" fill="#C8401A" opacity="0.4"/>
  <!-- Wheels -->
  <circle cx="8" cy="23" r="3" fill="#fff"/>
  <circle cx="8" cy="23" r="1.5" fill="#C8401A"/>
  <circle cx="23" cy="23" r="3" fill="#fff"/>
  <circle cx="23" cy="23" r="1.5" fill="#C8401A"/>
  <!-- Road line -->
  <rect x="3" y="27" width="26" height="2" rx="1" fill="#fff" opacity="0.3"/>
</svg>